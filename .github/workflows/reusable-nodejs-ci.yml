name: Node CI

on:
  workflow_call:
    inputs:
      directorys:
        description: Target directorys (comma separated)
        type: string
        default: .
      disabled-jobs:
        description: Disable Jobs (comma separated)
        type: string
        default: "NULL"
      install-apt-packages:
        description: Install apt packages (space separated)
        type: string
        default: ""
      lock-path:
        description: yarn.lock path
        type: string
        default: "{dir}/yarn.lock"
      check-git-diff:
        description: Check git diff
        type: boolean
        default: false
permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest

    outputs:
      directorys: ${{ steps.setup.outputs.directorys }}
      disabled-jobs: ${{ steps.setup.outputs.disabled-jobs }}

    steps:
      - name: Setup
        id: setup
        run: |
          # Use printf to safely handle the input without shell injection
          DIRECTORYS=$(printf '%s' "${{ inputs.directorys }}" | jq -R -c 'split(",") | map(select(length > 0) | ltrimstr(" ") | rtrimstr(" "))')
          echo "directorys=$DIRECTORYS" >> "$GITHUB_OUTPUT"
          DISABLED_JOBS=$(printf '%s' "${{ inputs.disabled-jobs }}" | jq -R -c 'split(",") | map(select(length > 0) | ltrimstr(" ") | rtrimstr(" "))' | sed -e "s/\"/\\\\\"/g")
          echo "disabled-jobs=$DISABLED_JOBS" >> "$GITHUB_OUTPUT"

  node-ci:
    runs-on: ubuntu-latest

    needs:
      - setup

    strategy:
      matrix:
        directory: ${{ fromJson(needs.setup.outputs.directorys) }}
      fail-fast: false

    steps:
      - name: ­¤øÄ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: ­¤ōé Set lock path
        id: lock-path
        run: |
          LOCK_PATH_TEMPLATE="${{ inputs.lock-path }}"
          DIR="${{ matrix.directory }}"
          LOCK_PATH="${LOCK_PATH_TEMPLATE//\{dir\}/$DIR}"
          echo "lock-path=$LOCK_PATH" >> "$GITHUB_OUTPUT"

      - name: ­¤ÅŚ Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ matrix.directory }}/.node-version
          cache: yarn
          cache-dependency-path: ${{ steps.lock-path.outputs.lock-path }}

      - name: ­¤æ©­¤Å╗ŌĆŹ­¤Æ╗ Install apt packages
        if: inputs.install-apt-packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.install-apt-packages }}

      - name: ­¤ōā Check package.json definition
        id: package-json
        working-directory: ${{ matrix.directory }}
        run: |
          compile=$(jq '.scripts | has("compile")' package.json)
          build=$(jq '.scripts | has("build")' package.json)
          generate=$(jq '.scripts | has("generate")' package.json)
          package=$(jq '.scripts | has("package")' package.json)
          lint=$(jq '.scripts | has("lint")' package.json)
          test=$(jq '.scripts | has("test")' package.json)

          echo "compile: $compile"
          echo "build: $build"
          echo "generate: $generate"
          echo "package: $package"
          echo "lint: $lint"
          echo "test: $test"

          {
            echo "compile=$compile"
            echo "build=$build"
            echo "generate=$generate"
            echo "package=$package"
            echo "lint=$lint"
            echo "test=$test"
          } >> "$GITHUB_OUTPUT"

          {
            echo "disabled-compile=$(echo ${{ needs.setup.outputs.disabled-jobs }} | jq -r '. | contains(["compile"])')"
            echo "disabled-build=$(echo ${{ needs.setup.outputs.disabled-jobs }} | jq -r '. | contains(["build"])')"
            echo "disabled-generate=$(echo ${{ needs.setup.outputs.disabled-jobs }} | jq -r '. | contains(["generate"])')"
            echo "disabled-package=$(echo ${{ needs.setup.outputs.disabled-jobs }} | jq -r '. | contains(["package"])')"
            echo "disabled-lint=$(echo ${{ needs.setup.outputs.disabled-jobs }} | jq -r '. | contains(["lint"])')"
            echo "disabled-test=$(echo ${{ needs.setup.outputs.disabled-jobs }} | jq -r '. | contains(["test"])')"
            echo "disabled-depcheck=$(echo ${{ needs.setup.outputs.disabled-jobs }} | jq -r '. | contains(["depcheck"])')"
          } >> "$GITHUB_OUTPUT"

      - name: ­¤ōé Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: ­¤æ©­¤Å╗ŌĆŹ­¤Æ╗ Install dependencies
        working-directory: ${{ matrix.directory }}
        run: yarn install --frozen-lockfile

      - name: ­¤æĆ Run linter
        if: steps.package-json.outputs.lint == 'true' && steps.package-json.outputs.disabled-lint == 'false'
        working-directory: ${{ matrix.directory }}
        run: yarn lint
        background: true

      - name: ­¤¦¬ Run tests
        if: steps.package-json.outputs.test == 'true' && steps.package-json.outputs.disabled-test == 'false'
        working-directory: ${{ matrix.directory }}
        run: yarn test
        background: true

      - name: Ōśæ’ĖÅ Check Dependencies
        if: steps.package-json.outputs.disabled-depcheck == 'false'
        working-directory: ${{ matrix.directory }}
        run: npx depcheck
        background: true

      - name: ­¤æĆ Wait for linter/tests/depcheck
        wait-all: true

      - name: ­¤Äü Run package
        if: steps.package-json.outputs.package == 'true' && steps.package-json.outputs.disabled-package == 'false'
        working-directory: ${{ matrix.directory }}
        run: yarn package

      - name: ­¤Åā Run compile
        if: steps.package-json.outputs.compile == 'true' && steps.package-json.outputs.disabled-compile == 'false'
        working-directory: ${{ matrix.directory }}
        run: yarn compile

      - name: ­¤ÅŚ’ĖÅ Run build & generate (Nuxt.js)
        if: >-
          steps.package-json.outputs.build == 'true' &&
          steps.package-json.outputs.disabled-build == 'false' &&
          steps.package-json.outputs.generate == 'true' &&
          steps.package-json.outputs.disabled-generate == 'false'
        working-directory: ${{ matrix.directory }}
        run: |
          yarn build
          yarn generate

      - name: Check exists dist directory
        id: check-dist
        working-directory: ${{ matrix.directory }}
        run: |
          IS_DIRECTORY=$(test -d dist && echo true || echo false)
          IS_SYMLINK=$(test -L dist && echo true || echo false)
          echo "exists=$(test "$IS_DIRECTORY" = true && test "$IS_SYMLINK" = false && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: ­¤ō” Upload dist artifact
        if: steps.check-dist.outputs.exists == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.directory }}-dist
          path: ${{ matrix.directory }}/dist

      - name: Check exists output directory
        id: check-output
        run: |
          IS_DIRECTORY=$(test -d output && echo true || echo false)
          IS_SYMLINK=$(test -L output && echo true || echo false)
          echo "exists=$(test "$IS_DIRECTORY" = true && test "$IS_SYMLINK" = false && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: ­¤ō” Upload output artifact
        if: steps.check-output.outputs.exists == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.directory }}-output
          path: ${{ matrix.directory }}/output

      - name: ­¤æĆ Check git status
        if: inputs.check-git-diff == true
        run: |
          git status
          git diff --exit-code || (echo "Git status is not clean." && exit 1)

  finished-node-ci:
    name: Check finished Node CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - node-ci

    steps:
      - name: Check build failure
        run: |
          echo "Build status: ${{ needs.node-ci.result }}"
          if [ "${{ needs.node-ci.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
