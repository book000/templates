name: Maven CI

on:
  workflow_call:
    inputs:
      java-version:
        description: Java version
        type: string
        default: "17"
      jdk-distribution:
        description: JDK distribution
        type: string
        default: "adopt"
      is-merged:
        description: Is merged
        type: boolean
        default: ${{ github.event.pull_request.merged == true }}
      is-release:
        description: Whether to release
        type: boolean
        default: true
      pr-head-sha:
        description: Pull request head SHA
        type: string
        default: ${{ github.event.pull_request.head.sha }}
      version:
        description: Next custom version (Not included prefix)
        type: string
        default: ""
      directory:
        description: Working directory containing pom.xml
        type: string
        default: .
      allow-unsafe-pr-checkout:
        description: >-
          Allow checking out a fork pull request's head SHA from a
          pull_request_target-triggered workflow. Only set this to true
          after the caller workflow has gated it behind a manual review
          step (e.g. an Environment approval), since this defeats
          actions/checkout's default pwn-request protection.
        type: boolean
        default: false
    outputs:
      version:
        description: Next version
        value: ${{ jobs.calc-version.outputs.version }}
      tag:
        description: Next tag
        value: ${{ jobs.calc-version.outputs.tag }}
      changelog:
        description: Changelog
        value: ${{ jobs.calc-version.outputs.changelog }}

permissions:
  contents: read

jobs:
  # バージョンを計算する
  calc-version:
    name: Calculate next version
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating tags

    outputs:
      # バージョン
      version: ${{ steps.tag-version.outputs.new_version }}
      # バージョンタグ
      tag: ${{ steps.tag-version.outputs.new_tag }}
      # リリースノート
      changelog: ${{ steps.tag-version.outputs.changelog }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # マージされていない時には github.event.pull_request.head.sha を使い、マージされた時にはgithub.base_refを使う
          ref: ${{ inputs.is-merged == true && github.base_ref || inputs.pr-head-sha }}
          fetch-depth: 0
          allow-unsafe-pr-checkout: ${{ inputs.allow-unsafe-pr-checkout }}
          # allow-unsafe-pr-checkout 有効時(=フォークPRをcheckoutする場合)は
          # GITHUB_TOKEN を git config に残さないことでpwn-requestのリスクを下げる
          persist-credentials: ${{ !inputs.allow-unsafe-pr-checkout }}

      - name: Bump version and push tag
        id: tag-version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: "minor"
          custom_release_rules: "feat:minor:✨ Features,fix:patch:🐛 Fixes,docs:patch:📰 Docs,chore:patch:🎨 Chore,pref:patch:🎈 Performance improvements,refactor:patch:🧹 Refactoring,build:patch:🔍 Build,ci:patch:🔍 CI,revert:patch:⏪ Revert,style:patch:🧹 Style,test:patch:👀 Test,release:major:📦 Release"
          dry_run: ${{ inputs.is-merged == true && 'false' || 'true' }}
          custom_tag: ${{ inputs.version }}

  # Mavenでビルドする
  build:
    name: Maven build
    runs-on: ubuntu-latest
    needs: calc-version
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Check out the repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # マージされていない時には github.event.pull_request.head.sha を使い、マージされた時にはgithub.base_refを使う
          ref: ${{ inputs.is-merged == true && github.base_ref || inputs.pr-head-sha }}
          allow-unsafe-pr-checkout: ${{ inputs.allow-unsafe-pr-checkout }}
          # allow-unsafe-pr-checkout 有効時(=フォークPRをcheckoutする場合)は
          # GITHUB_TOKEN を git config に残さないことでpwn-requestのリスクを下げる
          persist-credentials: ${{ !inputs.allow-unsafe-pr-checkout }}

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: 17
          distribution: adopt

      - name: Cache local Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Replace pom.xml version
        working-directory: ${{ inputs.directory }}
        run: |
          sed -r -i "1,/version/s#<version>(.+?)</version>#<version>${{ needs.calc-version.outputs.version }}</version>#" pom.xml
          git diff

      - name: Build with Maven
        working-directory: ${{ inputs.directory }}
        run: mvn -B package --file pom.xml

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact
          path: ${{ inputs.directory }}/target/*.jar

      - name: Calculate hash
        working-directory: ${{ inputs.directory }}/target
        run: |
          sha256sum -- *.jar > sha256sum.txt

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        if: inputs.is-merged == true && inputs.is-release == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ needs.calc-version.outputs.tag }}
          name: ${{ needs.calc-version.outputs.tag }}
          body: ${{ needs.calc-version.outputs.changelog }}
          artifacts: |
            ${{ inputs.directory }}/target/*.jar
            ${{ inputs.directory }}/target/sha256sum.txt

  finished-build:
    name: Check finished Maven build
    runs-on: ubuntu-latest
    if: always()
    needs:
      - calc-version
      - build
    permissions:
      actions: read

    steps:
      - name: Check build failure
        run: |
          echo "Build status: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
