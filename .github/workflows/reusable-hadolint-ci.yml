name: hadolint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true