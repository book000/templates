# Node.js テンプレートバリアントの lint・テストを実行する
# このワークフローで CI が通ったバージョンのみ master にマージされるため、
# Renovate による依存更新は常に動作確認済みの状態が保たれる。

name: Test Node.js Templates

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
    paths:
      - "nodejs/**"
      - ".github/workflows/test-nodejs-templates.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.variant }} variant
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant:
          - base
          - config-batch
          - fastify
          - discord-bot
      fail-fast: false

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          package_json_file: nodejs/${{ matrix.variant }}/package.json

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: nodejs/${{ matrix.variant }}/pnpm-lock.yaml

      - name: 📂 Copy common config files
        run: |
          cp nodejs/common/tsconfig.json       nodejs/${{ matrix.variant }}/tsconfig.json
          cp nodejs/common/eslint.config.mjs   nodejs/${{ matrix.variant }}/eslint.config.mjs
          cp nodejs/common/.prettierrc.yml     nodejs/${{ matrix.variant }}/.prettierrc.yml
          cp nodejs/common/.depcheckrc.json    nodejs/${{ matrix.variant }}/.depcheckrc.json

      - name: 👨🏻‍💻 Install dependencies
        working-directory: nodejs/${{ matrix.variant }}
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile --prefer-frozen-lockfile 2>&1 | tee /tmp/pnpm-install.log
          if grep -qF "Ignored build scripts" /tmp/pnpm-install.log; then
            echo ""
            echo "::error::pnpm がビルドスクリプトを無視しました。pnpm-workspace.yaml の allowBuilds に追加してください:"
            grep "Ignored build scripts" /tmp/pnpm-install.log
            exit 1
          fi

      - name: 👀 Run linter
        working-directory: nodejs/${{ matrix.variant }}
        run: pnpm run lint

      - name: 🧪 Run tests
        working-directory: nodejs/${{ matrix.variant }}
        run: pnpm run test

  finished:
    name: All Node.js template tests passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test

    steps:
      - name: Check result
        run: |
          echo "Test result: ${{ needs.test.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Some template tests failed"
            exit 1
          fi
