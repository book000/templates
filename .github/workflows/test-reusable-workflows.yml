name: Test Reusable Workflows

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/reusable-*.yml"
      - "test-scenarios/**"
      - ".github/workflows/test-reusable-workflows.yml"
  workflow_dispatch:

jobs:
  # Test Node.js CI with yarn
  test-nodejs-ci:
    name: Test reusable-nodejs-ci
    uses: ./.github/workflows/reusable-nodejs-ci.yml
    with:
      directorys: "test-scenarios/nodejs-yarn"
      disabled-jobs: "depcheck"  # Skip depcheck to avoid test failures
      check-git-diff: false

  # Test Node.js CI with pnpm
  test-nodejs-ci-pnpm:
    name: Test reusable-nodejs-ci-pnpm
    uses: ./.github/workflows/reusable-nodejs-ci-pnpm.yml
    with:
      directorys: "test-scenarios/nodejs-pnpm"
      disabled-jobs: "depcheck"  # Skip depcheck to avoid test failures
      check-git-diff: false

  # Test Maven CI
  test-maven:
    name: Test reusable-maven
    uses: ./.github/workflows/reusable-maven.yml
    with:
      is-merged: false
      is-release: false
      directory: test-scenarios/maven

  # Test Actionlint
  test-actionlint:
    name: Test reusable-actionlint
    uses: ./.github/workflows/reusable-actionlint.yml

  # Test Hadolint CI
  test-hadolint:
    name: Test reusable-hadolint-ci
    uses: ./.github/workflows/reusable-hadolint-ci.yml

  # Test Add Reviewer (only on pull requests to avoid issues)
  test-add-reviewer:
    name: Test reusable-add-reviewer
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/reusable-add-reviewer.yml
    permissions:
      pull-requests: write
    with:
      actors: "github-actions[bot],test-user"
      reviewers: "github-actions[bot]"

  # ネガティブテスト: allowBuilds 未設定で Ignored build scripts が検出されることを確認
  # reusable workflow は continue-on-error に対応していないため直接スクリプトをテストする
  test-nodejs-ci-pnpm-ignored-build:
    name: Test Ignored build scripts detection
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          package_json_file: test-scenarios/nodejs-pnpm-ignored-build-scripts/package.json

      - name: 🏗 Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: test-scenarios/nodejs-pnpm-ignored-build-scripts/.node-version

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: 📂 Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-ignored-build-test-${{ hashFiles('test-scenarios/nodejs-pnpm-ignored-build-scripts/pnpm-lock.yaml') }}

      - name: 👨🏻‍💻 Install dependencies (Ignored build scripts が発生するため失敗が期待される)
        id: install
        continue-on-error: true
        working-directory: test-scenarios/nodejs-pnpm-ignored-build-scripts
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile --prefer-frozen-lockfile 2>&1 | tee /tmp/pnpm-install.log
          if grep -qF "Ignored build scripts" /tmp/pnpm-install.log; then
            echo ""
            echo "::error::pnpm がビルドスクリプトを無視しました。pnpm-workspace.yaml の allowBuilds に追加してください:"
            grep "Ignored build scripts" /tmp/pnpm-install.log
            exit 1
          fi

      - name: ✅ Ignored build scripts 検出の確認
        run: |
          if [[ "${{ steps.install.outcome }}" != "failure" ]]; then
            echo "❌ 検出テスト失敗: install ステップが失敗しませんでした (outcome: ${{ steps.install.outcome }})"
            echo "   allowBuilds 未設定で esbuild を依存に持つ場合、検出して失敗するはずです"
            exit 1
          fi
          if ! grep -qF "Ignored build scripts" /tmp/pnpm-install.log; then
            echo "❌ 検出テスト失敗: 'Ignored build scripts' がログに見つかりませんでした"
            echo "   install ステップが別の理由で失敗した可能性があります"
            cat /tmp/pnpm-install.log
            exit 1
          fi
          echo "✅ Ignored build scripts の検出が正常に機能しています"

  # Test Docker workflow (dry run without pushing)
  test-docker:
    name: Test reusable-docker
    uses: ./.github/workflows/reusable-docker.yml
    with:
      targets: |
        [
          {
            "packageName": "test-package",
            "imageName": "test-image",
            "context": "test-scenarios/docker",
            "file": "test-scenarios/docker/Dockerfile"
          }
        ]
      is-merged: false
      is-release: false
    secrets:
      DOCKER_USERNAME: ${{ github.actor }}
      DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # Summary job to check all tests passed
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test-nodejs-ci
      - test-nodejs-ci-pnpm
      - test-nodejs-ci-pnpm-ignored-build
      - test-maven
      - test-actionlint
      - test-hadolint
      - test-add-reviewer
      - test-docker

    steps:
      - name: Check test results
        run: |
          echo "Node.js CI result: ${{ needs.test-nodejs-ci.result }}"
          echo "Node.js CI pnpm result: ${{ needs.test-nodejs-ci-pnpm.result }}"
          echo "Node.js CI pnpm (ignored build scripts detection) result: ${{ needs.test-nodejs-ci-pnpm-ignored-build.result }}"
          echo "Maven result: ${{ needs.test-maven.result }}"
          echo "Actionlint result: ${{ needs.test-actionlint.result }}"
          echo "Hadolint result: ${{ needs.test-hadolint.result }}"
          echo "Add Reviewer result: ${{ needs.test-add-reviewer.result }}"
          echo "Docker result: ${{ needs.test-docker.result }}"

          # Check if any positive test failed (skipped is OK for add-reviewer when not on PR)
          if [[ "${{ needs.test-nodejs-ci.result }}" != "success" ]] || \
             [[ "${{ needs.test-nodejs-ci-pnpm.result }}" != "success" ]] || \
             [[ "${{ needs.test-nodejs-ci-pnpm-ignored-build.result }}" != "success" ]] || \
             [[ "${{ needs.test-maven.result }}" != "success" ]] || \
             [[ "${{ needs.test-actionlint.result }}" != "success" ]] || \
             [[ "${{ needs.test-hadolint.result }}" != "success" ]] || \
             [[ "${{ needs.test-add-reviewer.result }}" == "failure" ]] || \
             [[ "${{ needs.test-docker.result }}" != "success" ]]; then
            echo "❌ Some reusable workflow tests failed!"
            exit 1
          else
            echo "✅ All reusable workflow tests passed!"
          fi